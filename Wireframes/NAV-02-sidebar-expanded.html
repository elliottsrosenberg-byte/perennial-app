<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAV-02 – Sidebar Expanded (Labels)</title>
<style>
:root {
  --bg:#f5f4f1; --surface:#fff; --surface-2:#f0ede8; --surface-hover:#f7f5f2;
  --border:rgba(0,0,0,0.07); --border-strong:rgba(0,0,0,0.13);
  --text-primary:#1a1916; --text-secondary:#6b6860; --text-tertiary:#a8a49e;
  --accent:#3d6b4f; --accent-light:rgba(61,107,79,0.08);
  --shadow-card:0 1px 4px rgba(0,0,0,0.07),0 0 0 0.5px rgba(0,0,0,0.07);
  --radius:12px; --radius-sm:8px; --radius-xs:6px;
  --sidebar-red:#d94f3d;
  --sw:196px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181715; --surface:#222120; --surface-2:#2a2927; --surface-hover:#272523;
  --border:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.11);
  --text-primary:#f0ede8; --text-secondary:#9a9690; --text-tertiary:#5c5a56;
  --accent:#5a9470; --accent-light:rgba(90,148,112,0.12);
  --shadow-card:0 1px 4px rgba(0,0,0,0.2),0 0 0 0.5px rgba(255,255,255,0.06);
  --sidebar-red:#b83e2e;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text-primary);
  height:100vh;
  display:flex;
  overflow:hidden;
  font-size:13px;
}

/* ── Sidebar ── */
.app-sidebar{
  width:var(--sw);
  background:var(--sidebar-red);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Studio header */
.studio-header{
  padding:13px 12px 11px;
  display:flex;align-items:center;gap:9px;
  border-bottom:0.5px solid rgba(255,255,255,0.12);
  flex-shrink:0;
}
.studio-mark{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:white;flex-shrink:0;
}
.studio-info{flex:1;min-width:0;}
.studio-name{font-size:12px;font-weight:650;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.studio-sub{font-size:9px;color:rgba(255,255,255,0.5);margin-top:1px;}

/* Primary nav */
.nav-section{padding:8px 6px 4px;display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 9px;border-radius:7px;
  color:rgba(255,255,255,0.6);cursor:pointer;
}
.nav-item:hover{background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.9);}
.nav-item.active{background:rgba(255,255,255,0.18);color:white;}
.nav-item-icon{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.nav-label{font-size:12px;font-weight:500;white-space:nowrap;}
.nav-divider{height:0.5px;background:rgba(255,255,255,0.12);margin:4px 9px;}

/* Pinned section */
.pinned-section{
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:0 6px 6px;
  border-top:0.5px solid rgba(255,255,255,0.12);
  margin-top:2px;
}
.pinned-header{
  display:flex;align-items:center;gap:5px;
  padding:9px 9px 6px;
  flex-shrink:0;
}
.pinned-header-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.38);}
.pinned-items{display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.pinned-items::-webkit-scrollbar{display:none;}
.pinned-item{
  display:flex;align-items:center;gap:7px;
  padding:5px 9px;border-radius:6px;
  color:rgba(255,255,255,0.6);cursor:pointer;
}
.pinned-item:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.88);}
.type-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-note{background:rgba(255,255,255,0.5);}
.dot-project{background:rgba(255,210,100,0.7);}
.dot-contact{background:rgba(150,200,255,0.7);}
.dot-reminder{background:rgba(255,130,130,0.7);}
.pinned-item-label{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.pinned-item-type{font-size:9px;color:rgba(255,255,255,0.28);flex-shrink:0;}

/* Settings utility (bottom, above user) */
.util-section{padding:4px 6px;border-top:0.5px solid rgba(255,255,255,0.12);flex-shrink:0;}
.util-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 9px;border-radius:7px;
  color:rgba(255,255,255,0.45);cursor:pointer;
}
.util-item:hover{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.7);}

/* User footer */
.user-footer{
  padding:9px 12px 12px;
  display:flex;align-items:center;gap:8px;
  border-top:0.5px solid rgba(255,255,255,0.12);
  cursor:pointer;flex-shrink:0;
}
.user-footer:hover{background:rgba(255,255,255,0.06);}
.user-avatar{
  width:24px;height:24px;border-radius:50%;
  background:rgba(255,255,255,0.22);
  display:flex;align-items:center;justify-content:center;
  color:white;font-size:10px;font-weight:600;flex-shrink:0;
}
.user-info{flex:1;min-width:0;}
.user-name{font-size:11px;font-weight:550;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-email{font-size:9px;color:rgba(255,255,255,0.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── Main content area ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.section-topbar{
  height:44px;display:flex;align-items:center;
  padding:0 20px;
  border-bottom:0.5px solid var(--border-strong);
  background:var(--surface);
  flex-shrink:0;
}
.topbar-title{font-size:14px;font-weight:650;}
.content-area{flex:1;background:var(--surface);display:flex;align-items:center;justify-content:center;}
.content-hint{font-size:12px;color:var(--text-tertiary);font-style:italic;}

/* ── Annotation ── */
.annotation{position:fixed;bottom:16px;right:24px;font-size:10px;color:rgba(255,255,255,0.35);font-style:italic;}
</style>
</head>
